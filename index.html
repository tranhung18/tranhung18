<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trần Hữu Hùng | Portfolio V2 - Bento Console</title>

    <!-- Anti-FOUC version redirect: reads the persisted "portfolio-version"
         preference and redirects before paint if it disagrees. V2 is the
         default homepage (this file, index.html); V1 lives at v1.html. -->
    <script>
    (function () {
        try {
            var saved = localStorage.getItem('portfolio-version');
            var isV1 = location.pathname.endsWith('v1.html');
            if (saved === 'v1' && !isV1) {
                location.replace('v1.html');
            } else if (saved === 'v2' && isV1) {
                location.replace('index.html');
            }
        } catch (e) { /* localStorage unavailable - stay on current page */ }
    })();
    </script>

    <meta name="description" content="Trần Hữu Hùng - Middle Full-stack Developer. Bento-grid console layout portfolio (V2). Laravel, VueJS, FastAPI, React, MySQL, PostgreSQL.">
    <meta name="author" content="Trần Hữu Hùng">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

    <!-- Self-hosted fonts, reused from V1 -->
    <link rel="stylesheet" href="css/fonts.css">
    <!-- Phosphor Icons -->
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">

    <!-- V2-only stylesheet - completely separate design system from V1 -->
    <link rel="stylesheet" href="css/v2.css">

    <!-- Pinned Three.js ESM build; costs nothing until a scene actually imports it. -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>
</head>
<body class="lang-en v2-body" data-version="v2">
    <a class="skip-link" href="#main-content">Skip to content</a>

    <!-- Full-page ambient "tech snake" background (js/v2-snake-bg.js). Decorative
         only, hence aria-hidden; no-ops on reduced-motion/mobile. -->
    <div class="snake-bg-wrap" id="snake-bg-wrap" aria-hidden="true"></div>

    <!-- Dock-style top nav (deliberately not V1's floating pill navbar) -->
    <header class="dock" id="dock">
        <div class="dock-inner">
            <a href="#hero" class="dock-brand" aria-label="Trần Hữu Hùng - home">
                <span class="dock-dots" aria-hidden="true"><i></i><i></i><i></i></span>
                <span class="dock-path">~/hung<span class="dock-caret">_</span></span>
            </a>

            <nav class="dock-nav" id="dock-nav" aria-label="Primary">
                <!-- Populated by v2.js from data.nav -->
            </nav>

            <div class="dock-controls">
                <div class="version-switch-wrapper">
                    <div class="version-switch" role="group" aria-label="Switch portfolio layout version">
                        <button class="version-btn" data-version-btn="v1" aria-pressed="false" aria-label="Version 1">V1</button>
                        <span class="version-separator">/</span>
                        <button class="version-btn active" data-version-btn="v2" aria-pressed="true" aria-label="Version 2">V2</button>
                    </div>
                </div>
                <div class="lang-switch-wrapper">
                    <div class="lang-switch" role="group" aria-label="Switch language">
                        <button class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
                        <span class="lang-separator">/</span>
                        <button class="lang-btn" data-lang="vi" aria-pressed="false">VI</button>
                    </div>
                </div>
                <button class="dock-menu-toggle" id="dock-menu-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="mobile-nav-overlay">
                    <span class="bar"></span><span class="bar"></span><span class="bar"></span>
                </button>
            </div>
        </div>
    </header>

    <nav class="mobile-nav-overlay" id="mobile-nav-overlay" aria-label="Primary (mobile)"></nav>

    <main id="main-content">
        <!-- ============ HERO — BENTO GRID ============ -->
        <section id="hero" class="v2-section hero-bento-section" aria-label="Introduction">
            <div class="section-shell">
                <div class="bento-grid hero-bento" id="hero-bento" aria-busy="true">
                    <!-- Populated by v2.js: intro tile + 3D tile -->
                    <div class="bento-skeleton" aria-hidden="true"></div>
                </div>
            </div>
        </section>

        <!-- ============ ABOUT ============ -->
        <section id="about" class="v2-section" aria-label="About">
            <div class="section-shell">
                <h2 class="v2-section-title reveal-scale"><span class="title-index"></span><span class="en">About</span><span class="vi">Giới thiệu</span></h2>
                <div class="bento-grid about-bento" id="about-bento" aria-busy="true"></div>
            </div>
        </section>

        <!-- ============ SKILLS ============ -->
        <section id="skills" class="v2-section" aria-label="Tech stack">
            <div class="section-shell">
                <h2 class="v2-section-title reveal-scale"><span class="title-index"></span><span class="en">Tech Stack</span><span class="vi">Công nghệ sử dụng</span></h2>
                <div class="skill-filter-bar" id="skill-filter-bar" role="group" aria-label="Filter tech stack"></div>
                <div class="bento-grid skills-bento" id="skills-bento" aria-busy="true"></div>
            </div>
        </section>

        <!-- ============ PROJECTS ============ -->
        <section id="projects" class="v2-section" aria-label="Featured projects">
            <div class="section-shell">
                <h2 class="v2-section-title reveal-scale"><span class="title-index"></span><span class="en">Featured Projects</span><span class="vi">Dự án Thực tế</span></h2>
                <div class="bento-grid projects-bento" id="projects-bento" aria-busy="true"></div>
            </div>
        </section>

        <!-- ============ EXPERIENCE ============ -->
        <section id="experience" class="v2-section" aria-label="Career journey">
            <div class="section-shell">
                <h2 class="v2-section-title reveal-scale"><span class="title-index"></span><span class="en">Career Journey</span><span class="vi">Kinh nghiệm & Học vấn</span></h2>
                <ol class="exp-stack" id="exp-stack" aria-busy="true"></ol>
            </div>
        </section>

        <!-- ============ CONTACT ============ -->
        <section id="contact" class="v2-section" aria-label="Contact">
            <div class="section-shell">
                <h2 class="v2-section-title reveal-scale"><span class="title-index"></span><span class="en">Let's Build Something Great</span><span class="vi">Cùng Xây Dựng Dự Án Lớn</span></h2>
                <div class="bento-grid contact-bento" id="contact-bento" aria-busy="true"></div>
            </div>
        </section>
    </main>

    <footer class="v2-footer" id="v2-footer"></footer>

    <noscript>
        <div style="padding:3rem 1.5rem;font-family:monospace;color:#c9d1d9;background:#0a0e14;">
            This layout renders from JavaScript. Please enable JavaScript, or
            <a href="v1.html" style="color:#7c5cff;">view the static V1 version</a>.
        </div>
    </noscript>

    <script type="module" src="js/version-toggle.js"></script>
    <script type="module" src="js/v2.js"></script>
</body>
</html>
